<h1>Toko Buku Jihan</h1>
<main class="formulir">
    <h2>Berikan Testimoni Anda</h2>
    <form id="formTestimoni">
    <label for="nama">Nama Lengkap</label>
    <input type="text" id="nama" placeholder="👤 Masukkan nama lengkap Anda" required>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="📧 Masukkan email aktif" required>

    <label for="wa">Nomor WhatsApp</label>
    <input type="tel" id="wa" placeholder="📱 Contoh: 08xxxxxxxxxx">

    <label for="pesan">Pesan</label>
    <textarea id="pesan" rows="5" placeholder="✍️ Tulis pesan Anda di sini..." required></textarea>

    <button type="submit">Kirim Pesan 🚀</button>
</form>
</main>
<footer>
 <p>&copy; 2026 Toko Buku Jihan</p>
</footer>
<script>
    document.getElementById('formTestimoni').addEventListener('submit', function(e) {
        e.preventDefault();

        const nama = document.getElementById('nama').value;
        const asal = document.getElementById('asal').value;
        const email = document.getElementById('email').value;
        const judul = document.getElementById('judul').value;
        const rating = document.getElementById('rating').value;
        const pesan = document.getElementById('pesan').value;
        const dataBaru ={ nama, asal, email, judul, rating, pesan };

        //Ambil list dari localStorage
        const testimoniList =
        JSON.parse(localStorage.getItem('testimoniList')) || [];

        //Tambahkan testimoni baru
        testimoniList.push(dataBaru);

        //Simpan kembali ke localStorage
        localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

        //Arahkan ke halaman konfirmasi
        window.location.href= 'proses-testimoni.html';
    });
</script>
